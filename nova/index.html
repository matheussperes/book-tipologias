<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Tipologia — Book</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="container header-inner">
    <div class="logo">
      <span class="logo-dot"></span>
      Book de Tipologias
    </div>
  </div>
</header>

<main class="container">

  <!-- Breadcrumb -->
  <nav class="breadcrumb">
    <a href="../index.html">Tipologias</a>
    <span>/</span>
    <span id="bc-label">Nova tipologia</span>
  </nav>

  <!-- Formulário -->
  <div id="form-container">
    <div class="loading"><div class="spinner"></div> Carregando…</div>
  </div>

</main>

<!-- Toast -->
<div id="toast"></div>

<script src="../../config.js"></script>
<script src="../../supabase.js"></script>
<script>
  // Detectar modo: edição (tem ?id=) ou criação
  const params      = new URLSearchParams(location.search);
  const editId      = params.get('id');
  const modoEdicao  = Boolean(editId);
  let   dadosOriginais = null;

  // Arquivos selecionados
  const arquivosImagens = [];
  const arquivosDocs    = [];

  document.title = modoEdicao
    ? 'Editar Tipologia — Book'
    : 'Nova Tipologia — Book';

  async function inicializar() {
    if (modoEdicao) {
      document.getElementById('bc-label').textContent = 'Editar tipologia';
      try {
        dadosOriginais = await buscarTipologia(editId);
        if (!dadosOriginais) {
          document.getElementById('form-container').innerHTML =
            '<div class="empty"><p>Tipologia não encontrada.</p></div>';
          return;
        }
      } catch (e) {
        document.getElementById('form-container').innerHTML =
          `<div class="empty"><p>Erro: ${e.message}</p></div>`;
        return;
      }
    }
    renderFormulario(dadosOriginais);
  }

  function renderFormulario(d = null) {
    const v = (campo) => d?.[campo] ?? '';
    const arr = (campo) => (d?.[campo] || []).join(', ');

    document.getElementById('form-container').innerHTML = `
      <!-- Dados básicos -->
      <div class="form-section">
        <div class="form-titulo">Dados básicos</div>
        <div class="form-grid">
          <div class="form-grupo form-full">
            <label for="nome">Nome da tipologia *</label>
            <input type="text" id="nome" placeholder="Ex: Compact 2 Dorm 55" value="${v('nome')}" required />
          </div>
          <div class="form-grupo">
            <label for="tipo_torre">Tipo de torre *</label>
            <select id="tipo_torre">
              <option value="">Selecione…</option>
              <option value="Slim"    ${v('tipo_torre') === 'Slim'    ? 'selected' : ''}>Slim</option>
              <option value="Compact" ${v('tipo_torre') === 'Compact' ? 'selected' : ''}>Compact</option>
              <option value="Plus"    ${v('tipo_torre') === 'Plus'    ? 'selected' : ''}>Plus</option>
            </select>
          </div>
          <div class="form-grupo">
            <label for="area_privada">Área privada (m²)</label>
            <input type="number" id="area_privada" step="0.01" min="0" placeholder="Ex: 55.00" value="${v('area_privada')}" />
          </div>
          <div class="form-grupo">
            <label for="area_total">Área total (m²)</label>
            <input type="number" id="area_total" step="0.01" min="0" placeholder="Ex: 65.00" value="${v('area_total')}" />
          </div>
          <div class="form-grupo">
            <label for="dormitorios">Dormitórios</label>
            <input type="number" id="dormitorios" min="0" max="10" value="${v('dormitorios')}" />
          </div>
          <div class="form-grupo">
            <label for="suites">Suítes</label>
            <input type="number" id="suites" min="0" max="10" value="${v('suites')}" />
          </div>
          <div class="form-grupo">
            <label for="vagas">Vagas</label>
            <input type="number" id="vagas" min="0" max="10" value="${v('vagas')}" />
          </div>
        </div>
      </div>

      <!-- Descrição -->
      <div class="form-section">
        <div class="form-titulo">Descrição</div>
        <div class="form-grid">
          <div class="form-grupo form-full">
            <label for="diferenciais">Diferenciais</label>
            <textarea id="diferenciais" placeholder="Descreva os diferenciais desta tipologia…">${v('diferenciais')}</textarea>
          </div>
          <div class="form-grupo form-full">
            <label for="observacoes">Observações internas</label>
            <textarea id="observacoes" placeholder="Notas internas, restrições, recomendações…">${v('observacoes')}</textarea>
          </div>
        </div>
      </div>

      <!-- Elegibilidade -->
      <div class="form-section">
        <div class="form-titulo">Elegibilidade e histórico</div>
        <div class="form-grid">
          <div class="form-grupo form-full">
            <label for="cidades_elegiveis">Cidades elegíveis</label>
            <input type="text" id="cidades_elegiveis"
              placeholder="Campinas, São Paulo, Sorocaba (separadas por vírgula)"
              value="${arr('cidades_elegiveis')}" />
            <span style="font-size:12px;color:var(--muted);margin-top:4px">Separe as cidades por vírgula.</span>
          </div>
          <div class="form-grupo form-full">
            <label for="projetos_aplicados">Projetos onde foi aplicada</label>
            <input type="text" id="projetos_aplicados"
              placeholder="Ex: Pinheiros Tower, ABC Prime (separados por vírgula)"
              value="${arr('projetos_aplicados')}" />
          </div>
        </div>
      </div>

      <!-- Upload de imagens -->
      <div class="form-section">
        <div class="form-titulo">Imagens e plantas</div>
        <div class="upload-zone" id="zone-imagens" onclick="document.getElementById('input-imagens').click()">
          <p>Clique para selecionar imagens (JPG, PNG)</p>
          <p style="font-size:12px;margin-top:4px">Você pode selecionar múltiplos arquivos</p>
          <input type="file" id="input-imagens" accept="image/*" multiple style="display:none" />
        </div>
        <div class="upload-preview" id="preview-imagens"></div>
        ${modoEdicao ? '<p style="font-size:12px;color:var(--muted);margin-top:8px">Novas imagens serão adicionadas às existentes.</p>' : ''}
      </div>

      <!-- Upload de documentos -->
      <div class="form-section">
        <div class="form-titulo">Documentos (PDF, DWG)</div>
        <div class="upload-zone" id="zone-docs" onclick="document.getElementById('input-docs').click()">
          <p>Clique para selecionar documentos (PDF)</p>
          <input type="file" id="input-docs" accept=".pdf,.dwg,.doc,.docx" multiple style="display:none" />
        </div>
        <div id="lista-docs" style="margin-top:10px;display:flex;flex-direction:column;gap:6px"></div>
      </div>

      <!-- Ações -->
      <div class="form-acoes">
        <a href="${modoEdicao ? `../tipologia/index.html?id=${editId}` : '../index.html'}" class="btn btn-outline">
          Cancelar
        </a>
        <button class="btn btn-primary" id="btn-salvar" onclick="salvar()">
          ${modoEdicao ? '💾 Salvar alterações' : '✅ Criar tipologia'}
        </button>
      </div>`;

    // Bind de uploads
    document.getElementById('input-imagens').addEventListener('change', handleImagens);
    document.getElementById('input-docs').addEventListener('change', handleDocs);
  }

  // ── Upload handlers ────────────────────────────────
  function handleImagens(e) {
    Array.from(e.target.files).forEach(f => {
      arquivosImagens.push(f);
      const img = document.createElement('img');
      img.src   = URL.createObjectURL(f);
      img.className = 'upload-thumb';
      img.title = f.name;
      document.getElementById('preview-imagens').appendChild(img);
    });
  }

  function handleDocs(e) {
    const lista = document.getElementById('lista-docs');
    Array.from(e.target.files).forEach(f => {
      arquivosDocs.push(f);
      const item = document.createElement('div');
      item.className = 'doc-item';
      item.innerHTML = `<span class="doc-nome">📄 ${f.name}</span>`;
      lista.appendChild(item);
    });
  }

  // ── Salvar ─────────────────────────────────────────
  async function salvar() {
    const nome    = document.getElementById('nome').value.trim();
    const tipo    = document.getElementById('tipo_torre').value;

    if (!nome) { mostrarToast('Informe o nome da tipologia.', true); return; }
    if (!tipo) { mostrarToast('Selecione o tipo de torre.', true);  return; }

    const btn = document.getElementById('btn-salvar');
    btn.disabled    = true;
    btn.textContent = 'Salvando…';

    try {
      const dados = {
        nome,
        tipo_torre:   tipo,
        area_privada: parseFloat(document.getElementById('area_privada').value) || null,
        area_total:   parseFloat(document.getElementById('area_total').value)   || null,
        dormitorios:  parseInt(document.getElementById('dormitorios').value)    || null,
        suites:       parseInt(document.getElementById('suites').value)         || null,
        vagas:        parseInt(document.getElementById('vagas').value)          || null,
        diferenciais: document.getElementById('diferenciais').value.trim()  || null,
        observacoes:  document.getElementById('observacoes').value.trim()   || null,
        cidades_elegiveis:  parseArray(document.getElementById('cidades_elegiveis').value),
        projetos_aplicados: parseArray(document.getElementById('projetos_aplicados').value)
      };

      let tipId;
      if (modoEdicao) {
        await atualizarTipologia(editId, dados);
        tipId = editId;
      } else {
        const nova = await criarTipologia(dados);
        tipId = nova.id;
      }

      // Upload de imagens
      for (const f of arquivosImagens) {
        await uploadImagem(tipId, f, f.name.replace(/\.[^.]+$/, ''));
      }

      // Upload de documentos
      for (const f of arquivosDocs) {
        await uploadDocumento(tipId, f, f.name.replace(/\.[^.]+$/, ''));
      }

      mostrarToast(modoEdicao ? 'Tipologia atualizada!' : 'Tipologia criada com sucesso!');
      setTimeout(() => {
        window.location.href = `../tipologia/index.html?id=${tipId}`;
      }, 1000);

    } catch (e) {
      mostrarToast(`Erro ao salvar: ${e.message}`, true);
      btn.disabled    = false;
      btn.textContent = modoEdicao ? '💾 Salvar alterações' : '✅ Criar tipologia';
    }
  }

  // ── Toast ───────────────────────────────────────────
  function mostrarToast(msg, erro = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = erro ? 'erro show' : 'show';
    setTimeout(() => { t.classList.remove('show', 'erro'); }, 3000);
  }

  inicializar();
</script>
</body>
</html>
